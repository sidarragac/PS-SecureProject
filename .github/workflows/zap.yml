name: OWASP ZAP Security Scan

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OWASP ZAP Baseline Scan (no reports)
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: "http://34.228.198.119/"
          fail_action: false
          cmd_options: "-I"